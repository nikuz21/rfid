kind = "web"
previewPath = "/"
title = "TermiPay Admin Console"
version = "1.0.0"
id = "artifacts/termipay"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24378

[services.development]
run = "pnpm --filter @workspace/termipay run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/termipay", "run", "build" ]
publicDir = "artifacts/termipay/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24378"
BASE_PATH = "/"
